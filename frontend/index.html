<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园墙审核系统</title>
    <!-- 全局样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- ===== 登录页 ===== -->
        <div id="page-login" class="page active">
            <div class="login-box">
                <h1>校园墙审核系统</h1>
                <p class="login-desc">请输入管理员密码</p>
                <input type="password" id="login-password" placeholder="管理员密码" autofocus>
                <button id="login-btn" onclick="handleLogin()">登 录</button>
                <p id="login-error" class="error-msg"></p>
            </div>
        </div>

        <!-- ===== 主界面（登录后显示） ===== -->
        <div id="page-main" class="page">
            <!-- 侧边栏导航 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>校园墙</h2>
                    <span class="sidebar-subtitle">审核系统</span>
                </div>
                <nav class="sidebar-nav">
                    <!-- data-page 对应 JS 中 showPage() 的参数 -->
                    <a href="#" class="nav-item active" data-page="dashboard" onclick="showPage('dashboard')">
                        <span class="nav-icon">📊</span> 仪表盘
                    </a>
                    <a href="#" class="nav-item" data-page="review" onclick="showPage('review')">
                        <span class="nav-icon">✅</span> 投稿审核
                        <!-- 待审核数量角标，由 JS 轮询更新 -->
                        <span id="review-badge" class="badge" style="display:none">0</span>
                    </a>
                    <a href="#" class="nav-item" data-page="posts" onclick="showPage('posts')">
                        <span class="nav-icon">📋</span> 投稿管理
                    </a>
                    <a href="#" class="nav-item" data-page="submit" onclick="showPage('submit')">
                        <span class="nav-icon">✏️</span> 手动投稿
                    </a>
                    <a href="#" class="nav-item" data-page="settings" onclick="showPage('settings')">
                        <span class="nav-icon">⚙️</span> 系统管理
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <span id="sidebar-user">管理员</span>
                    <a href="#" onclick="handleLogout()" class="logout-link">退出</a>
                </div>
            </aside>

            <!-- 主要内容区：各个页面通过 JS 切换显示 -->
            <main class="main-content">
                <div id="page-dashboard" class="page-section active"></div>
                <div id="page-review" class="page-section"></div>
                <div id="page-posts" class="page-section"></div>
                <div id="page-submit" class="page-section"></div>
                <div id="page-settings" class="page-section"></div>
            </main>
        </div>
    </div>

    <!-- 全局消息提示浮层（成功/失败） -->
    <div id="toast" class="toast"></div>

    <!-- JS 文件按依赖顺序加载 -->
    <script src="js/api.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/review.js"></script>
    <script src="js/pages/posts.js"></script>
    <script src="js/pages/submit.js"></script>
    <script src="js/pages/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
