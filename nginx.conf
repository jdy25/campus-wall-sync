# ===== Nginx 反向代理配置 =====
# 用途：方案二「前后端分离」
# - 前端静态文件（frontend/）由 Nginx 直接返回
# - API 请求（/api/ 等）转发给后端 Flask（127.0.0.1:5000）
# - Flask 只监听本机，不对外暴露端口
#
# 部署步骤：
#   sudo cp nginx.conf /etc/nginx/sites-available/campus-wall
#   sudo ln -s /etc/nginx/sites-available/campus-wall /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default    # 关闭默认页面
#   sudo nginx -s reload
#
# 前端文件位置：
#   sudo cp -r frontend /var/www/campus-wall/
#   或修改 root 路径指向项目中的 frontend/ 目录

server {
    listen 80;               # 监听 80 端口（HTTP）
    server_name _;           # 匹配所有域名，也可改成具体域名

    # 前端静态文件根目录
    root /var/www/campus-wall/frontend;
    index index.html;

    # === API 请求 → 转发到 Flask ===
    location /api/ {
        proxy_pass http://127.0.0.1:5000;               # Flask 监听地址
        proxy_set_header Host $host;                     # 传递原始 Host
        proxy_set_header X-Real-IP $remote_addr;         # 客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链
        proxy_set_header X-Forwarded-Proto $scheme;      # 请求协议（http/https）
    }

    # === Webhook 请求（tduck 回调，不需要鉴权）→ 转发 Flask ===
    location /webhook/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # === 健康检查 ===
    location /health {
        proxy_pass http://127.0.0.1:5000;
    }

    # === 测试接口（tduck/Halo 连接测试）===
    location /test/ {
        proxy_pass http://127.0.0.1:5000;
    }

    # === 其他所有请求 → 返回前端 SPA ===
    # try_files 依次尝试：直接文件 → 目录 → index.html（SPA 路由回退）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
